{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    class="weather-bg"
    style="background-image: linear-gradient(135deg, rgba(102, 126, 234, 0.7), rgba(118, 75, 162, 0.7), rgba(240, 147, 251, 0.7), rgba(79, 172, 254, 0.7)), url('{{ image_url }}'); background-size: cover; background-attachment: fixed; background-position: center;"
  >
    <div class="container">
      <h1 class="heading">Weather App</h1>

      <form method="POST">
        {% csrf_token %}
        <input type="text" name="city" placeholder="Enter City" />
        <button type="submit" class="btn">Search</button>
      </form>
      <div class="weather">
        <div class="left">
          <h2 class="temp">{{ temp }}&#176; C</h2>
          <h2 class="city">{{ city }}</h2>
        </div>
        <div class="right">
          <div class="icon">
            <p>
              <img
                src="http://openweathermap.org/img/w/{{ icon }}.png"
                width="120px"
              />
            </p>
          </div>
          <div class="condition">
            <p>{{ description }}</p>
            <p>{{ day }}</p>
          </div>
        </div>
      </div>
    </div>

    {% if exception_occurred %}
    <script>
      window.onload = function () {
        alert("City information is not available to Weather API");
      };
    </script>
    {% endif %}
  </body>
</html>
